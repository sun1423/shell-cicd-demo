name: My First Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  test:
    name: 1 - Test on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run test
        run: bash scripts/hello.sh test

  deploy-dev:
    name: 2 - Auto Deploy to Dev (echo only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Simulate dev deploy
        run: bash scripts/hello.sh dev

  deploy-prod:
    name: 3 - Manual Deploy to OpenShift
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true

      - name: Set namespace
        run: oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Clean up old resources
        run: |
          echo "Deleting old deployment, service and route if they exist..."
          oc delete deployment nginx-app --ignore-not-found=true
          oc delete svc nginx-app --ignore-not-found=true
          oc delete route nginx-app --ignore-not-found=true
          echo "Cleanup done"

      - name: Wait for cleanup
        run: sleep 10

      - name: Fresh deployment
        run: |
          echo "Creating fresh deployment..."
          oc create deployment nginx-app --image=docker.io/bitnami/nginx:latest
          oc expose deployment nginx-app --port=8080

      - name: Wait for rollout
        run: oc rollout status deployment/nginx-app --timeout=120s

      - name: Expose route
        run: oc expose svc/nginx-app || echo "Route already exists"

      - name: Show app URL
        run: |
          echo "Your app is live at:"
          oc get route nginx-app -o jsonpath='{.spec.host}'
