name: My First Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to do?'
        required: true
        type: choice
        options:
          - test
          - build-and-push
          - deploy-to-openshift

jobs:

  test:
    name: 1 - Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'test'
    steps:
      - uses: actions/checkout@v4
      - name: Run test
        run: bash scripts/hello.sh test

  deploy-dev:
    name: 2 - Build and Push Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'build-and-push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image with no cache
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/movies:latest .

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movies:latest

      - name: Confirm image pushed
        run: |
          echo "================================="
          echo "Image pushed: docker.io/${{ secrets.DOCKER_USERNAME }}/movies:latest"
          echo "================================="

  deploy-prod:
    name: 3 - Deploy to OpenShift
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy-to-openshift'
    environment: production
    steps:

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true

      - name: Set namespace
        run: oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Delete old resources
        run: |
          echo "--- Cleaning old resources ---"
          oc delete deployment myapp --ignore-not-found=true
          oc delete svc myapp --ignore-not-found=true
          oc delete route myapp --ignore-not-found=true
          oc delete replicaset -l app=myapp --ignore-not-found=true
          oc delete pod -l app=myapp --ignore-not-found=true
          echo "--- Cleanup done ---"

      - name: Wait for full cleanup
        run: |
          oc wait --for=delete pod -l app=myapp --timeout=60s || echo "No pods to wait for"
          sleep 10
          echo "All clear"

      - name: Clear OpenShift image cache
        run: |
          echo "--- Clearing image cache ---"
          oc delete imagestream myapp --ignore-not-found=true
          echo "--- Cache cleared ---"

      - name: Fresh deployment
        run: |
          echo "Deploying docker.io/
