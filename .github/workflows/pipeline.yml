name: My First Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to do?'
        required: true
        type: choice
        options:
          - test
          - build-and-push
          - deploy-to-openshift

jobs:

  test:
    name: 1 - Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'test'
    steps:
      - uses: actions/checkout@v4
      - name: Run test
        run: bash scripts/hello.sh test

  deploy-dev:
    name: 2 - Build and Push Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'build-and-push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/movies:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/movies:${{ github.run_number }} .

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/movies:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/movies:${{ github.run_number }}

      - name: Confirm image pushed
        run: |
          echo "================================="
          echo "Image pushed:"
          echo "docker.io/${{ secrets.DOCKER_USERNAME }}/movies:latest"
          echo "docker.io/${{ secrets.DOCKER_USERNAME }}/movies:${{ github.run_number }}"
          echo "================================="

  deploy-prod:
    name: 3 - Deploy to OpenShift
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy-to-openshift'
    environment: production
    steps:

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true

      - name: Set namespace
        run: oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Delete everything old
        run: |
          echo "--- Cleaning all old resources ---"
          oc delete all -l app=nginx-app --ignore-not-found=true
          oc delete deployment nginx-app --ignore-not-found=true
          oc delete svc nginx-app --ignore-not-found=true
          oc delete route nginx-app --ignore-not-found=true
          oc delete replicaset -l app=nginx-app --ignore-not-found=true
          oc delete pod -l app=nginx-app --ignore-not-found=true
          echo "--- Cleanup done ---"

      - name: Wait for full cleanup
        run: |
          echo "Waiting for all pods to terminate..."
          oc wait --for=delete pod -l app=nginx-app --timeout=60s || echo "No pods to wait for"
          sleep 10
          echo "All clear"

      - name: Fresh deployment with versioned image
        run: |
          echo "Deploying docker.io/${{ secrets.DOCKER_USERNAME }}/movies:${{ github.run_number }}"
          oc create deployment nginx-app --image=docker.io/${{ secrets.DOCKER_USERNAME }}/movies:${{ github.run_number }}

      - name: Set image pull policy to Always
        run: |
          oc patch deployment nginx-app -p '{"spec":{"template":{"spec":{"containers":[{"name":"movies","imagePullPolicy":"Always"}]}}}}'

      - name: Expose service
        run: oc expose deployment nginx-app --port=8080

      - name: Wait for rollout
        run: oc rollout status deployment/nginx-app --timeout=120s

      - name: Expose route
        run: oc expose svc/nginx-app || echo "Route already exists"

      - name: Verify pod is running
        run: |
          echo "--- Pod status ---"
          oc get pods -l app=nginx-app
          echo "--- Deployment status ---"
          oc get deployment nginx-app

      - name: Show app URL
        run: |
          echo "================================="
          echo "Your app is live at:"
          echo "http://$(oc get route nginx-app -o jsonpath='{.spec.host}')"
          echo "================================="
