name: My First Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  test:
    name: 1 - Test on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run test
        run: bash scripts/hello.sh test

  deploy-dev:
    name: 2 - Build and Push Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx-openshift:latest .

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx-openshift:latest

  deploy-prod:
    name: 3 - Manual Deploy to OpenShift
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true

      - name: Deploy nginx to OpenShift
        run: |
          oc new-app ${{ secrets.DOCKER_USERNAME }}/nginx-openshift:latest --name=nginx-app || \
          oc set image deployment/nginx-app nginx-openshift=${{ secrets.DOCKER_USERNAME }}/nginx-openshift:latest

      - name: Expose the service
        run: |
          oc expose svc/nginx-app --port=8080 || echo "Route already exists"

      - name: Show app URL
        run: oc get route nginx-app -o jsonpath='{.spec.host}'
