name: My First Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to do?'
        required: true
        type: choice
        options:
          - test
          - build-and-push
          - deploy-to-openshift

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/movies:latest

jobs:

  test:
    name: 1 - Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'test'
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/hello.sh test

  build:
    name: 2 - Build and Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'build-and-push'
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - run: docker build --no-cache -t ${{ env.IMAGE }} .
      - run: docker push ${{ env.IMAGE }}
     name: Inject API key
     run: |
          echo "Files in current directory:"
          ls -la
          sed -i 's/TMDB_API_KEY_PLACEHOLDER/${{ secrets.TMDB_API_KEY }}/g' index.html
          echo "Injection done"
  deploy:
    name: 3 - Deploy to OpenShift
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy-to-openshift'
    environment: production
    steps:
      - name: Install oc
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          tar -xzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true

      - name: Cleanup
        run: |
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc delete deployment,svc,route,replicaset,pod -l app=myapp --ignore-not-found=true
          oc delete imagestream myapp --ignore-not-found=true
          oc wait --for=delete pod -l app=myapp --timeout=60s || true
          sleep 10

      - name: Deploy
        run: |
          oc create deployment myapp --image=docker.io/${{ env.IMAGE }}
          oc patch deployment myapp -p '{"spec":{"template":{"spec":{"containers":[{"name":"movies","imagePullPolicy":"Always"}]}}}}'
          oc expose deployment myapp --port=8080
          oc rollout status deployment/myapp --timeout=120s
          oc expose svc/myapp || true

      - name: URL
        run: oc get route myapp -o jsonpath='{.spec.host}'
